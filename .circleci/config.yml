# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs

jobs:
  rust-cache:
    docker:
      - image: cimg/rust:1.64.0
    steps:
      - checkout
      - run: cargo --version
      - persist_to_workspace:
          root: target
          paths:
            - debug
  rust-build-win:
    docker:
      - image: cimg/rust:1.64.0
    steps:
      - checkout
      - attach_workspace:
          at: target/debug
      - run:
          name: Cargo release build
          command: |
            sudo apt install mingw-w64
            rustup target add x86_64-pc-windows-gnu
            cargo build --release --target x86_64-pc-windows-gnu
      - store_artifacts:
          path: /home/circleci/project/target/x86_64-pc-windows-gnu/release/educlient.exe
          destination: windows
      - persist_to_workspace:
          root: target
          paths:
            - x86_64-pc-windows-gnu/release
  rust-build-linux:
    docker:
      - image: cimg/rust:1.64.0
    steps:
      - checkout
      - attach_workspace:
          at: target/debug
      - run:
          name: Cargo release build
          command: cargo build --release --target x86_64-unknown-linux-gnu
      - store_artifacts:
          path: /home/circleci/project/target/x86_64-unknown-linux-gnu/release/educlient
          destination: linux
      - persist_to_workspace:
          root: target
          paths:
            - x86_64-unknown-linux-gnu/release
  publish:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: target
          

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  rust-build-workflow:
    jobs:
      - rust-cache
      - rust-build-win:
          requires: 
            - rust-cache
      - rust-build-linux:
          requires:
            - rust-cache
      - publish:
          requires:
            - rust-build-linux
            - rust-build-win